<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratrx</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');
        @import
url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend Deca', sans-serif; cursor: crosshair; }
        body, html { height: 100%; background: #000; overflow: hidden; color: white; }

        /* VIDEO BACKGROUND */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
            filter: brightness(0.9) blur(0px);
            background-color: black;
        }

        /* ENTRY SCREEN */
        #entry-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        #entry-screen.fade-out { opacity: 0; pointer-events: none; }
        .click-text { letter-spacing: 5px; text-transform: uppercase; font-size: 14px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* CENTERED WRAPPER */
        .wrapper { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* CENTERED CARD */
        .card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; 
            width: 90%; 
            max-width: 380px;
            border-radius: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            opacity: 0.8; 
            transform: translateY(40px);
            transition: all 1s ease-out;
        }
        .card.show { opacity: 0.7; transform: translateY(0); }

        .pfp { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            margin-bottom: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            object-fit: cover;
        }

        /* GLITCH NAME */
        .glitch-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .glitch {
            position: relative;
            display: inline-block;
            font-size: 32px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
            100% { clip: rect(67px, 9999px, 62px, 0); transform: skew(0.6deg); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.1deg); }
            100% { clip: rect(15px, 9999px, 90px, 0); transform: skew(0.2deg); }
        }

        #equalizer { width: 100%; max-width: 250px; height: 50px; margin-bottom: 10px; }

        .music-player { width: 100%; margin: 15px 0; 
      }
      .soundtrack:hover {
  box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
}
      .time-display {
  display: flex;
  justify-content: space-between;
  padding: 0 10px;
  margin-top: 8px; /* left-right padding add karega */
}
        #seek-slider {
            width: 100%; height: 5px; appearance: none; cursor: pointer;
            background: rgba(255, 255, 255, 0.2); border-radius: 5px; outline: none;
        }
        #seek-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  height: 16px;
  width: 16px;
  background: #fff;
  border-radius: 50%;
  cursor: pointer;
        
  /* White glow */
  box-shadow: 0 0 7px #fff, 0 0 7px #fff;
  transition: box-shadow 0.3s ease-in-out;
}

/* Stronger glow on hover */
#seek-slider::-webkit-slider-thumb:hover {
  box-shadow: 0 0 15px #fff, 0 0 30px #fff;
}

/* Optional pulsating animation */
@keyframes pulseWhite {
  from { box-shadow: 0 0 10px #fff, 0 0 20px #fff; }
  to   { box-shadow: 0 0 20px #fff, 0 0 40px #fff; }
}
/* Google Fonts import (signature style) */
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

.watermark {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 22px;
  color: #fff;
  font-family: 'Great Vibes', cursive;
  pointer-events: none;
  z-index: 9999;
  
  /* Letter spacing for distance between characters */
  letter-spacing: 8px;

  /* White glow effect */
  text-shadow: 0 0 5px #ffffff,
               0 0 10px #e0e0e0,
               0 0 20px #cccccc,
               0 0 40px #ffffff;

  /* Fade-in + glow animation */
  opacity: 0;
  animation: fadeInGlow 3s ease forwards, glow 2s ease-in-out infinite alternate;
}

@keyframes fadeInGlow {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes glow {
  from {
    text-shadow: 0 0 5px #ffffff,
                 0 0 10px #e0e0e0,
                 0 0 20px #cccccc;
  }
  to {
    text-shadow: 0 0 10px #ffffff,
                 0 0 20px #f5f5f5,
                 0 0 40px #ffffff,
                 0 0 60px #ffffff;
  }
}



#seek-slider::-webkit-slider-thumb {
  animation: pulseWhite 1.5s infinite alternate;
}
        .bio-text { font-size: 15px; color: #aa; margin-bottom: 5px; }

        .socials { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        .btn {
            background: rgba(255, 255, 255, 0); border: 0px solid rgba(255, 255, 255, 1);
            color: #fff; padding: 1px; text-decoration: none; border-radius: 8px;
            font-size: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
        }
        .btn:hover { background: rgba(255, 255, 255, 0); transform: scale(1); }
    </style>
</head>
<body>

    <!-- Video background -->
    <video id="bg-video" autoplay loop muted playsinline webkit-playsinline>
        <source src="https://cdn.jsdelivr.net/gh/pratrx-web/its_pratrx@main/videos/vader.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div id="entry-screen" onclick="start()">
        <p class="click-text">[ CLICK TO ENTER ]</p>
    </div>

    <audio id="audio" loop crossorigin="anonymous">
        <source src="https://cdn.jsdelivr.net/gh/pratrx-web/its_pratrx@main/videos/dido.mp3" type="audio/mpeg">
    </audio>
 
    <div class="wrapper">
        <div class="card" id="card">
            <img src="https://r2.guns.lol/9d437e2b-e801-409e-84a1-0b0e932d2cbe.webp" class="pfp" alt="pfp">
            
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="Pratrx">Pratrx</h1>
            </div>
         


            <canvas id="equalizer"></canvas>

            <div class="music-player">
                <input type="range" id="seek-slider" value="10">
                <div class="time-display">
                    <span id="current-time">0:03</span>
                  
                    <span id="duration-time">4:24</span>
                </div>
            </div>

            <p class="bio-text">"I'm wondering why I got out of bed at all..."</p>

            <div class="socials">
                <a href="https://youtube/@pratrxx" class="btn"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://github.com/" class="btn"><i class="fa-brands fa-github"></i></a>
             

            </div>
        </div>
    </div>
  
  <div class="watermark" id="wm">pratrxx</div>


    <script>
        // By default hide watermark
  document.getElementById('wm').style.display = 'none';

  // Jab user "Click to Enter" kare aur page load ho jaye
  window.addEventListener('load', () => {
    // Thoda delay ke baad show karo
    setTimeout(() => {
      document.getElementById('wm').style.display = 'block';
    }, 2000); // 2 second delay
  });
        const audio = document.getElementById('audio');
      audio.currentTime = 3;
      audio.volume = 0; // start muted
    let fade = setInterval(() => {
      if (audio.volume < 1) {
        audio.volume = Math.min(audio.volume + 0.05, 1);
      } else {
        clearInterval(fade);
      }
    }, 200); // every 200ms volume increase
  
        const video = document.getElementById('bg-video');
        const slider = document.getElementById('seek-slider');

        video.addEventListener('error', function(e) {
            console.error("CRITICAL: Video file failed to load", e);
            console.log("Video error details:", e);
        }, true);

        function start() {
            document.getElementById('entry-screen').classList.add('fade-out');
            document.getElementById('card').classList.add('show');

            video.muted = true;
            video.currentTime = 0;

            video.play().then(() => {
                console.log("Video playing successfully!");
            }).catch(e => {
                console.warn("Video play blocked:", e);
            });

            audio.play().catch(e => {
                console.warn("Audio blocked:", e);
            });

            setupVisualizer();
            setupTabAnimation();
        }

        video.addEventListener('loadeddata', () => {
            console.log("Video loaded successfully");
        });
        video.addEventListener('canplay', () => {
            console.log("Video can play");
        });
        audio.addEventListener('timeupdate', () => {
            slider.value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('current-time').innerText = format(audio.currentTime);
            if (!isNaN(audio.duration)) document.getElementById('duration-time').innerText = format(audio.duration);
        });

        slider.addEventListener('input', () => {
            audio.currentTime = (slider.value / 100) * audio.duration;
        });

        function format(s) {
            let m = Math.floor(s / 60);
            let sc = Math.floor(s % 60);
            return m + ":" + (sc < 10 ? "0" + sc : sc);
        }

        function setupVisualizer() {
            const canvas = document.getElementById("equalizer");
            const ctx = canvas.getContext("2d");
            const aCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = aCtx.createAnalyser();
            const source = aCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(aCtx.destination);
            analyser.fftSize = 64;
            const bufferLength = analyser.frequencyBinCount;
            const data = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let barWidth = (canvas.width / bufferLength) * 2;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let h = data[i] / 4;
                    ctx.fillStyle = `rgba(255, 255, 255, ${data[i]/250})`;
                    ctx.fillRect(x, canvas.height - h, barWidth - 1, h);
                    x += barWidth;
                }
            }
            draw();
        }

        function setupTabAnimation() {
            const titles = ["p", "pr", "pra", "prat", "pratrx", "prat"];
            let i = 0;
            setInterval(() => { document.title = titles[i]; i = (i + 1) % titles.length; }, 400);
        }
    </script>
</body>
</html>
